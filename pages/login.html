<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Log in to ListenUp" />
  <meta name="theme-color" content="#0a0a0a" />
  
  <title>Log In - ListenUp</title>

  <link rel="stylesheet" href="../assets/css/variables.css" />
  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="../assets/css/layout.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />
  <link rel="stylesheet" href="../assets/css/auth.css" />
</head>

<body data-page="login">
  <!-- NAVIGATION BAR -->
  <nav class="top-bar">
    <div class="nav-left">
      <a href="index.html" class="logo">
        <span>🎧</span>
        <span>ListenUp</span>
      </a>
    </div>

    <div class="nav-right">
      <button class="theme-toggle" id="theme-toggle" title="Toggle theme">🌙</button>
    </div>
  </nav>

  <!-- MAIN CONTENT -->
  <main class="main-layout">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-header">
          <h1>Welcome Back</h1>
          <p>Log in to continue listening</p>
        </div>

        <form class="auth-form" id="login-form">
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="your@email.com" required />
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="••••••••" required />
          </div>

          <div class="form-group checkbox">
            <input type="checkbox" id="remember" name="remember" />
            <label for="remember">Remember me</label>
          </div>

          <button type="submit" class="btn btn-primary" style="width: 100%; font-size: var(--font-size-md); padding: 12px 24px;">Log In</button>
        </form>

        <div class="auth-divider">or continue with</div>

        <div class="social-buttons">
          <button class="social-btn google" type="button">Google</button>
          <button class="social-btn apple" type="button">Apple</button>
        </div>

        <div class="auth-footer">
          <p>Don't have an account? <a href="signup.html">Sign up</a></p>
          <p><a href="#">Forgot your password?</a></p>
        </div>
      </div>
    </div>
  </main>

  <script src="../assets/js/theme.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script>
    const themeToggle = document.getElementById('theme-toggle');
    const themeManager = new ThemeManager();
    
    themeToggle.addEventListener('click', () => {
      const themes = ['dark', 'light', 'high-contrast'];
      const current = themeManager.getTheme();
      const next = themes[(themes.indexOf(current) + 1) % themes.length];
      themeManager.setTheme(next);
      updateThemeToggleIcon();
    });

    function updateThemeToggleIcon() {
      const current = themeManager.getTheme();
      const icons = { dark: '🌙', light: '☀️', 'high-contrast': '♿' };
      themeToggle.textContent = icons[current] || '🌙';
    }

    updateThemeToggleIcon();

    // Form submission
    document.getElementById('login-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      ListenUpUtils.notify('✅ Logging in...', 'info');
      ListenUpUtils.setStorage('currentUser', { email, loginTime: new Date() });
      setTimeout(() => {
        window.location.href = 'index.html';
      }, 1500);
    });
  </script>
</body>
</html>

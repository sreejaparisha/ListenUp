<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Sign up for ListenUp" />
  <meta name="theme-color" content="#0a0a0a" />
  
  <title>Sign Up - ListenUp</title>

  <link rel="stylesheet" href="../assets/css/variables.css" />
  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="../assets/css/layout.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />
  <link rel="stylesheet" href="../assets/css/auth.css" />
</head>

<body data-page="signup">
  <!-- NAVIGATION BAR -->
  <nav class="top-bar">
    <div class="nav-left">
      <a href="index.html" class="logo">
        <span>🎧</span>
        <span>ListenUp</span>
      </a>
    </div>

    <div class="nav-right">
      <button class="theme-toggle" id="theme-toggle" title="Toggle theme">🌙</button>
    </div>
  </nav>

  <!-- MAIN CONTENT -->
  <main class="main-layout">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-header">
          <h1>Create Your Account</h1>
          <p>Start listening to millions of songs for free</p>
        </div>

        <form class="auth-form" id="signup-form">
          <div class="form-group">
            <label for="fullname">Full Name</label>
            <input type="text" id="fullname" name="fullname" placeholder="Your name" required />
          </div>

          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="your@email.com" required />
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="At least 8 characters" required />
          </div>

          <div class="form-group">
            <label for="confirm-password">Confirm Password</label>
            <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirm password" required />
          </div>

          <div class="form-group checkbox">
            <input type="checkbox" id="terms" name="terms" required />
            <label for="terms">I agree to the Terms of Service</label>
          </div>

          <button type="submit" class="btn btn-primary" style="width: 100%; font-size: var(--font-size-md); padding: 12px 24px;">Sign Up</button>
        </form>

        <div class="auth-divider">or sign up with</div>

        <div class="social-buttons">
          <button class="social-btn google" type="button">Google</button>
          <button class="social-btn apple" type="button">Apple</button>
        </div>

        <div class="auth-footer">
          <p>Already have an account? <a href="login.html">Log in</a></p>
        </div>
      </div>
    </div>
  </main>

  <script src="../assets/js/theme.js"></script>
  <script src="../assets/js/utils.js"></script>
  <script>
    const themeToggle = document.getElementById('theme-toggle');
    const themeManager = new ThemeManager();
    
    themeToggle.addEventListener('click', () => {
      const themes = ['dark', 'light', 'high-contrast'];
      const current = themeManager.getTheme();
      const next = themes[(themes.indexOf(current) + 1) % themes.length];
      themeManager.setTheme(next);
      updateThemeToggleIcon();
    });

    function updateThemeToggleIcon() {
      const current = themeManager.getTheme();
      const icons = { dark: '🌙', light: '☀️', 'high-contrast': '♿' };
      themeToggle.textContent = icons[current] || '🌙';
    }

    updateThemeToggleIcon();

    document.getElementById('signup-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirm-password').value;
      
      if (password !== confirmPassword) {
        ListenUpUtils.notify('❌ Passwords do not match', 'error');
        return;
      }

      const email = document.getElementById('email').value;
      ListenUpUtils.notify('✅ Account created! Logging in...', 'success');
      ListenUpUtils.setStorage('currentUser', { email, loginTime: new Date() });
      
      setTimeout(() => {
        window.location.href = 'index.html';
      }, 1500);
    });
  </script>
</body>
</html>
          />
          <p class="form-helper" id="fullnameHelper"></p>
        </div>

        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <input 
            type="password" 
            id="password" 
            name="password"
            class="form-input" 
            placeholder="Min. 8 characters"
            required 
            minlength="8"
            autocomplete="new-password"
          />
          <p class="form-helper" id="passwordHelper">Must be at least 8 characters</p>
        </div>

        <button type="submit" class="auth-btn auth-btn-primary">Create Account</button>
      </form>

      <div class="divider"><span>or</span></div>

      <div class="auth-footer" style="border-top: none;">
        <p class="auth-footer-text">Already have an account?</p>
        <a href="login.html" class="auth-footer-link">Sign in here</a>
      </div>

      <div class="auth-footer">
        <p style="font-size: var(--font-size-xs); color: var(--text-tertiary); margin: 0;">
          By signing up, you agree to our Terms and Privacy Policy
        </p>
        <a href="../index.html" class="auth-footer-link">← Back</a>
      </div>
    </div>
  </div>

  <!-- JavaScript: Modular & Optimized -->
  <script src="../assets/js/theme.js"></script>
  <script src="../assets/js/responsive.js"></script>
  <script src="../assets/js/utils.js"></script>

  <script>
    document.getElementById('signupForm').addEventListener('submit', (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const fullname = document.getElementById('fullname').value;
      const password = document.getElementById('password').value;
      
      let hasError = false;

      // Validate email
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(email)) {
        document.getElementById('emailHelper').textContent = 'Please enter a valid email';
        document.getElementById('emailHelper').classList.add('error');
        hasError = true;
      }

      // Validate name
      if (fullname.trim().length < 2) {
        document.getElementById('fullnameHelper').textContent = 'Please enter your full name';
        document.getElementById('fullnameHelper').classList.add('error');
        hasError = true;
      }

      // Validate password
      if (password.length < 8) {
        document.getElementById('passwordHelper').textContent = 'Password must be at least 8 characters';
        document.getElementById('passwordHelper').classList.add('error');
        hasError = true;
      }

      if (hasError) return;

      // Register user
      ListenUpUtils.notify('✅ Account created! Redirecting...', 'success');
      
      const newUser = {
        email,
        fullname,
        createdAt: new Date(),
        theme: 'dark',
        premium: false
      };
      
      ListenUpUtils.setStorage('currentUser', newUser);
      
      setTimeout(() => {
        window.location.href = '../pages/index.html';
      }, 2000);
    });

    // Clear errors on input
    ['email', 'fullname', 'password'].forEach(id => {
      document.getElementById(id).addEventListener('input', () => {
        document.getElementById(id + 'Helper').classList.remove('error');
      });
    });
  </script>
</body>
</html>
